<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#080b14"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Glow blobs -->
  <ellipse cx="150" cy="140" rx="180" ry="160" fill="url(#glow1)"/>
  <ellipse cx="380" cy="390" rx="150" ry="130" fill="url(#glow2)"/>
  <!-- Stars -->
  <circle cx="80" cy="80" r="2" fill="white" opacity="0.6"/>
  <circle cx="160" cy="50" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="430" cy="100" r="2" fill="white" opacity="0.5"/>
  <circle cx="460" cy="200" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="50" cy="300" r="2" fill="white" opacity="0.4"/>
  <circle cx="480" cy="420" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="100" cy="440" r="2" fill="white" opacity="0.3"/>
  <circle cx="350" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <!-- Diamond shape -->
  <polygon points="256,110 340,256 256,402 172,256" fill="url(#diamond)" opacity="0.95"/>
  <!-- Inner diamond highlight -->
  <polygon points="256,155 315,256 256,357 197,256" fill="white" opacity="0.08"/>
  <!-- Center sparkle -->
  <circle cx="256" cy="256" r="18" fill="white" opacity="0.15"/>
  <circle cx="256" cy="256" r="8" fill="white" opacity="0.3"/>
</svg>
